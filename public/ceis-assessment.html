<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DollarVote · Your CEIS™ Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --teal:#1A8FA0; --green:#7DC832; --blue:#1A3A8F;
    --ink:#0B1525; --gray:#5E646E; --lgray:#9AA0AB;
    --line:#E8E8ED; --line2:#EFEFF3;
    --bg:#F5F5F7; --card:#FFFFFF; --warm:#EEF1F7;
    --gold:#C8972A; --amber:#B45309; --rose:#C1440E;
    --grad:linear-gradient(135deg,#1A3A8F 0%,#1A8FA0 52%,#7DC832 100%);
    --shadow-sm:0 1px 2px rgba(11,21,37,.04),0 2px 6px rgba(11,21,37,.05);
    --shadow:0 4px 12px rgba(11,21,37,.06),0 12px 32px rgba(11,21,37,.07);
    --shadow-lg:0 20px 60px rgba(11,21,37,.12);
    --r:18px; --r-sm:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.55;
    background-image:radial-gradient(circle at 12% 8%,rgba(26,143,160,.06),transparent 42%),radial-gradient(circle at 88% 92%,rgba(26,58,143,.05),transparent 45%);
    background-attachment:fixed;
  }
  .serif{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif}

  /* ============ LAYOUT ============ */
  .shell{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
  @media(max-width:980px){.shell{grid-template-columns:1fr}}

  /* ============ SIDEBAR ============ */
  .side{
    position:sticky;top:0;height:100vh;overflow-y:auto;
    background:var(--ink);color:#fff;padding:30px 26px 40px;
    display:flex;flex-direction:column;
  }
  @media(max-width:980px){.side{position:relative;height:auto}}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:30px}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;flex-shrink:0;overflow:hidden;box-shadow:0 4px 14px rgba(46,196,182,.2)}
  .brand-mark svg{width:19px;height:19px}
  .brand-name{font-weight:800;font-size:18px;letter-spacing:-.3px}
  .brand-name span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* live score block */
  .score-live{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:22px 20px;margin-bottom:24px;backdrop-filter:blur(8px)}
  .score-live-label{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--lgray);font-weight:700;margin-bottom:6px}
  .score-num{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:58px;font-weight:600;line-height:1;letter-spacing:-1px;display:flex;align-items:baseline;gap:4px}
  .score-num .pt{font-size:20px;color:var(--lgray);font-weight:500}
  .score-num.scoring{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .score-tier{font-size:13px;font-weight:600;margin-top:7px;color:var(--teal)}
  .score-prov{font-size:11.5px;color:var(--lgray);margin-top:10px;line-height:1.45;border-top:1px solid rgba(255,255,255,.08);padding-top:10px}

  .pillars{margin-bottom:8px}
  .pbar-row{margin-bottom:13px}
  .pbar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .pbar-top .nm{color:#D6D9DE;font-weight:600}
  .pbar-top .vl{color:var(--lgray);font-variant-numeric:tabular-nums}
  .pbar{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
  .pbar-fill{height:100%;border-radius:99px;width:0%;transition:width .6s cubic-bezier(.22,1,.36,1)}
  .pf-loc{background:linear-gradient(90deg,#1A3A8F,#1A8FA0)}
  .pf-sus{background:linear-gradient(90deg,#1A8FA0,#7DC832)}
  .pf-trn{background:linear-gradient(90deg,#1A3A8F,#22B5CC)}

  .step-nav{margin-top:18px;flex:1}
  .step-nav-h{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--lgray);font-weight:700;margin-bottom:12px}
  .step-item{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .2s;margin-bottom:1px}
  .step-item:hover{background:rgba(255,255,255,.05)}
  .step-item.active{background:rgba(46,196,182,.14)}
  .step-dot{width:21px;height:21px;border-radius:50%;border:2px solid rgba(255,255,255,.22);flex-shrink:0;display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--lgray);transition:all .25s}
  .step-item.active .step-dot{border-color:var(--teal);color:var(--teal)}
  .step-item.done .step-dot{background:var(--teal);border-color:var(--teal);color:var(--ink)}
  .step-label{font-size:13px;color:#C3C7CE;font-weight:500;line-height:1.25}
  .step-item.active .step-label{color:#fff;font-weight:600}
  .step-pts{margin-left:auto;font-size:11px;color:var(--lgray);font-variant-numeric:tabular-nums;font-weight:600}

  /* ============ MAIN ============ */
  .main{padding:0;overflow-x:hidden}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(251,250,246,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:16px 46px;display:flex;align-items:center;justify-content:space-between}
  @media(max-width:980px){.topbar{padding:14px 22px}}
  .prog-wrap{display:flex;align-items:center;gap:14px;flex:1;max-width:440px}
  .prog-track{flex:1;height:7px;background:var(--warm);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;background:var(--grad);border-radius:99px;width:0%;transition:width .5s cubic-bezier(.22,1,.36,1)}
  .prog-txt{font-size:13px;font-weight:600;color:var(--gray);white-space:nowrap;font-variant-numeric:tabular-nums}
  .save-btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--gray);background:none;border:1px solid var(--line);padding:9px 16px;border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
  .save-btn:hover{border-color:var(--teal);color:var(--teal)}

  .canvas{max-width:780px;margin:0 auto;padding:50px 46px 140px}
  @media(max-width:980px){.canvas{padding:36px 22px 120px}}

  .panel{display:none;animation:rise .5s cubic-bezier(.22,1,.36,1)}
  .panel.show{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  /* section header */
  .sec-tag{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;padding:6px 13px;border-radius:99px;margin-bottom:20px}
  .tag-loc{background:rgba(46,196,182,.12);color:#138f83}
  .tag-sus{background:rgba(68,207,108,.14);color:#2c9c4c}
  .tag-trn{background:rgba(26,115,212,.1);color:#1a5fb4}
  .tag-id{background:var(--warm);color:var(--gray)}
  .sec-pts-pill{margin-left:4px;padding:2px 9px;border-radius:99px;background:rgba(255,255,255,.5);font-weight:800}

  h1.q{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:36px;font-weight:600;line-height:1.12;letter-spacing:-.7px;margin-bottom:14px}
  @media(max-width:600px){h1.q{font-size:28px}}
  .q-sub{font-size:17px;color:var(--gray);line-height:1.6;margin-bottom:8px;max-width:90%}

  /* WHY THIS MATTERS box */
  .why{position:relative;background:rgba(255,255,255,.62);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-left:none;border-radius:var(--r);padding:22px 24px 22px 26px;margin:26px 0 32px;box-shadow:var(--shadow-sm);overflow:hidden}
  .why::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--grad)}
  .why-h{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--teal);margin-bottom:10px}
  .why-h svg{width:16px;height:16px}
  .why-body{font-size:15.5px;line-height:1.62;color:#2C3037}
  .why-body strong{color:var(--ink);font-weight:700}
  .why-stat{display:inline-flex;align-items:center;gap:6px;background:var(--warm);border-radius:8px;padding:3px 10px;font-size:13.5px;font-weight:700;color:var(--ink);margin:2px 3px 2px 0;font-variant-numeric:tabular-nums}
  .why-stat b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .margin-flag{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:13px;font-weight:700;color:#2c9c4c;background:rgba(68,207,108,.1);padding:7px 13px;border-radius:9px}
  .margin-flag svg{width:15px;height:15px}

  /* options */
  .opt-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--lgray);margin:0 0 13px}
  .opts{display:flex;flex-direction:column;gap:11px;margin-bottom:30px}
  .opt{position:relative;display:flex;align-items:flex-start;gap:14px;padding:17px 19px;border:1.5px solid rgba(255,255,255,.6);border-radius:var(--r-sm);cursor:pointer;transition:all .18s;background:rgba(255,255,255,.55);backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);box-shadow:var(--shadow-sm)}
  .opt:hover{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .opt.sel{border-color:var(--teal);background:linear-gradient(180deg,rgba(46,196,182,.05),rgba(68,207,108,.03));box-shadow:0 0 0 3px rgba(46,196,182,.1)}
  .opt-radio{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:grid;place-items:center;transition:all .2s}
  .opt.sel .opt-radio{border-color:var(--teal)}
  .opt.sel .opt-radio::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--grad)}
  .opt-txt{flex:1}
  .opt-main{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.4}
  .opt-desc{font-size:13.5px;color:var(--gray);margin-top:3px;line-height:1.45}
  .opt-pts{font-size:12.5px;font-weight:800;color:var(--teal);background:rgba(46,196,182,.1);padding:4px 10px;border-radius:8px;white-space:nowrap;align-self:center;font-variant-numeric:tabular-nums}

  /* text & number inputs */
  .field{margin-bottom:22px}
  .field-label{display:block;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:7px}
  .field-hint{font-size:13px;color:var(--gray);margin-bottom:9px;line-height:1.45}
  .field input,.field select{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;transition:all .18s;outline:none}
  .field input:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,196,182,.12)}
  .field input::placeholder{color:var(--lgray)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.field-row{grid-template-columns:1fr}}

  /* slider */
  .slider-wrap{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:22px 24px;margin-bottom:28px}
  .slider-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
  .slider-val{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:42px;font-weight:600;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .slider-cap{font-size:13px;color:var(--gray);font-weight:600;text-align:right;max-width:170px}
  input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:99px;background:var(--warm);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--teal);cursor:pointer;box-shadow:var(--shadow);transition:transform .15s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12)}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--teal);cursor:pointer;box-shadow:var(--shadow)}
  .slider-scale{display:flex;justify-content:space-between;font-size:11.5px;color:var(--lgray);margin-top:9px;font-weight:600}

  /* evidence upload */
  .evidence{background:var(--warm);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
  .evidence-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px}
  .evidence-title{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .evidence-title svg{width:17px;height:17px;color:var(--teal)}
  .tier-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:7px;text-transform:uppercase;letter-spacing:.4px}
  .tier-1{background:rgba(200,151,42,.16);color:#9c7012}
  .tier-2{background:rgba(100,116,139,.16);color:#475569}
  .tier-3{background:rgba(46,196,182,.16);color:#138f83}
  .evidence-desc{font-size:13px;color:var(--gray);line-height:1.5;margin-bottom:14px}
  .drop{border:2px dashed var(--line);border-radius:var(--r-sm);background:rgba(255,255,255,.6);padding:20px;text-align:center;cursor:pointer;transition:all .2s}
  .drop:hover{border-color:var(--teal);background:#fff}
  .drop.has{border-style:solid;border-color:var(--green);background:rgba(68,207,108,.06)}
  .drop svg{width:26px;height:26px;color:var(--lgray);margin-bottom:7px}
  .drop.has svg{color:var(--green)}
  .drop-main{font-size:14px;font-weight:600;color:var(--ink)}
  .drop-sub{font-size:12.5px;color:var(--lgray);margin-top:3px}
  .drop.has .drop-main{color:#2c9c4c}
  .sub-guide{display:flex;gap:9px;align-items:flex-start;background:rgba(26,115,212,.05);border-radius:10px;padding:12px 14px;margin-top:13px;font-size:13px;color:#2C3037;line-height:1.5}
  .sub-guide svg{width:16px;height:16px;color:var(--blue);flex-shrink:0;margin-top:2px}
  .sub-guide b{color:var(--ink)}

  /* nav buttons */
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:38px;padding-top:28px;border-top:1px solid var(--line)}
  .btn{font-family:inherit;font-size:15px;font-weight:700;padding:14px 28px;border-radius:13px;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--ink);color:#fff;box-shadow:var(--shadow)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .btn-primary.glow{background:var(--grad)}
  .btn-ghost{background:none;color:var(--gray);padding:14px 18px}
  .btn-ghost:hover{color:var(--ink)}
  .btn svg{width:18px;height:18px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* welcome panel */
  .welcome{text-align:center;padding-top:30px}
  .welcome .badge{display:inline-flex;align-items:center;gap:8px;background:var(--warm);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;color:var(--gray);margin-bottom:26px}
  .welcome .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(68,207,108,.2)}
  .welcome h1{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:50px;font-weight:600;line-height:1.06;letter-spacing:-1.2px;margin-bottom:20px}
  @media(max-width:600px){.welcome h1{font-size:34px}}
  .welcome h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .welcome p{font-size:18px;color:var(--gray);line-height:1.6;max-width:560px;margin:0 auto 16px}
  .wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:38px 0 14px;text-align:left}
  @media(max-width:600px){.wgrid{grid-template-columns:1fr}}
  .wcard{background:rgba(255,255,255,.6);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .wcard-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}
  .wcard-ic svg{width:22px;height:22px;color:#fff}
  .wcard h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .wcard p{font-size:13.5px;color:var(--gray);line-height:1.5;margin:0;text-align:left}
  .wmeta{display:flex;justify-content:center;gap:30px;margin:34px 0 38px;flex-wrap:wrap}
  .wmeta div{text-align:center}
  .wmeta .n{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:30px;font-weight:600;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .wmeta .l{font-size:12.5px;color:var(--gray);font-weight:600;margin-top:2px}

  /* review / submit */
  .review-card{background:rgba(255,255,255,.6);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-radius:var(--r);padding:8px 6px;margin-bottom:24px;box-shadow:var(--shadow)}
  .review-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--line2)}
  .review-row:last-child{border-bottom:none}
  .rr-check{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .rr-check.ok{background:rgba(68,207,108,.15)}
  .rr-check.no{background:var(--warm)}
  .rr-check svg{width:13px;height:13px}
  .rr-name{font-size:14.5px;font-weight:600;flex:1}
  .rr-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--lgray)}
  .rr-pts{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink);min-width:54px;text-align:right}
  .final-score-card{background:var(--ink);border-radius:24px;padding:42px;text-align:center;color:#fff;margin-bottom:28px;position:relative;overflow:hidden}
  .final-score-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(46,196,182,.25),transparent 60%)}
  .fsc-label{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--lgray);font-weight:700;position:relative}
  .fsc-num{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;font-size:90px;font-weight:600;line-height:1;margin:8px 0;position:relative;letter-spacing:-2px}
  .fsc-num span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .fsc-tier{font-size:19px;font-weight:700;color:var(--teal);position:relative}
  .fsc-note{font-size:13.5px;color:var(--lgray);margin-top:14px;position:relative;line-height:1.5;max-width:400px;margin-left:auto;margin-right:auto}

  .pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  ::-webkit-scrollbar{width:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(150,150,150,.3);border-radius:99px;border:3px solid var(--bg)}
  .side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-color:var(--ink)}
</style>
</head>
<body>
<div class="shell">

  <!-- ================= SIDEBAR ================= -->
  <aside class="side">
    <div class="brand">
      <div class="brand-mark">
        <img src="/logo.png" alt="DollarVote" style="width:26px;height:26px;object-fit:contain">
      </div>
      <div class="brand-name">Dollar<span>Vote</span></div>
    </div>

    <div class="score-live">
      <div class="score-live-label">Your CEIS™ Score — Live</div>
      <div class="score-num" id="liveScore">—<span class="pt">/100</span></div>
      <div class="score-tier" id="liveTier">Start your assessment</div>
      <div class="score-prov" id="liveProv">This is a live preview. Your official score is finalized after document verification.</div>
    </div>

    <div class="pillars">
      <div class="pbar-row">
        <div class="pbar-top"><span class="nm">Locality</span><span class="vl" id="vLoc">0 / 40</span></div>
        <div class="pbar"><div class="pbar-fill pf-loc" id="bLoc"></div></div>
      </div>

/* ---------- Geocoding via OpenStreetMap Nominatim (no API key needed) ---------- */
// Turn a street address into { lat, lng }. Best-effort: returns nulls on failure so submit never blocks.
async function geocodeAddress(address){
  if(!address) return { lat:null, lng:null };
  try{
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=us,ca,mx&q=${encodeURIComponent(address)}`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if(!res.ok) return { lat:null, lng:null };
    const data = await res.json();
    const f = Array.isArray(data) && data[0];
    if(f && f.lat && f.lon) return { lat:Number(f.lat), lng:Number(f.lon) };
  }catch(e){ /* offline / blocked — fall through */ }
  return { lat:null, lng:null };
}

      <input type="text" id="id_state" placeholder="e.g. Michigan" value="${i.state||''}">
    </div>
  </div>
  <div class="field">
    <label class="field-label">Business street address</label>
    <div class="field-hint">Used to place your business on the DollarVote map. Your exact address isn't shown publicly — only your location pin.</div>
    <input type="text" id="id_address" placeholder="e.g. 1234 Woodward Ave, Detroit, MI 48226" value="${i.address||''}">
  </div>
  <div class="field">
    <label class="field-label">What kind of business are you?</label>
    <div class="field-hint">This sets your scoring track — a restaurant and a hardware store are scored by different standards that fit how each actually serves the community.</div>
    <select id="id_cat">
      <option value="">Choose your category…</option>
      <option ${i.cat==='restaurant'?'selected':''} value="restaurant">Restaurant / Café / Food Service</option>
      <option ${i.cat==='grocery'?'selected':''} value="grocery">Grocery / Specialty Food</option>
      <option ${i.cat==='retail'?'selected':''} value="retail">Retail — General</option>
      <option ${i.cat==='hardware'?'selected':''} value="hardware">Retail — Hardware / Home</option>
      <option ${i.cat==='services'?'selected':''} value="services">Personal Services (salon, spa, cleaning)</option>
      <option ${i.cat==='professional'?'selected':''} value="professional">Professional Services (legal, accounting, etc.)</option>
      <option ${i.cat==='fitness'?'selected':''} value="fitness">Health &amp; Fitness</option>
      <option ${i.cat==='other'?'selected':''} value="other">Something else</option>
    </select>
  </div>
  <div class="field">
    <label class="field-label">D-U-N-S number <span style="color:var(--lgray);font-weight:500">(optional)</span></label>
    <div class="field-hint">Have a Dun &amp; Bradstreet number? Great — it unlocks our highest verification tier. Don't have one? Leave it blank and we'll help you register for free.</div>
    <input type="text" id="id_duns" placeholder="00-000-0000" value="${i.duns||''}">
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost" onclick="prev()">Back</button>
    <button class="btn btn-primary" onclick="saveIdentity()">Continue
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>`;
}

/* ---------- SCORE SECTION ---------- */
function scoreHTML(s){
  const idx = scoreSections.indexOf(s)+1;
  const ans = state.answers[s.id];
  const hasEv = state.evidence[s.id];
  const statsHTML = (s.why.stats||[]).map(x=>`<span class="why-stat">${x}</span>`).join('');
  return `
  <span class="sec-tag ${s.tagClass}">${iconForInline(s.pillar)} ${s.tag} · ${s.max} points <span class="sec-pts-pill">${idx} of 10</span></span>
  <h1 class="q">${s.q}</h1>
  <p class="q-sub">${s.sub}</p>

  <div class="why">
    <div class="why-h">${sparkIcon()} Why this helps your business</div>
    <div class="why-body">${s.why.body}</div>
    ${statsHTML?`<div style="margin-top:13px">${statsHTML}</div>`:''}
    ${s.why.margin?`<div class="margin-flag">${trendIcon()} ${s.why.margin}</div>`:''}
  </div>

  <div class="opt-label">Choose what fits best — be honest, you can improve any score over time</div>
  <div class="opts" id="opts_${s.id}">
    ${s.opts.map((o,i)=>`
      <div class="opt ${ans===i?'sel':''}" onclick="pick('${s.id}',${i})">
        <div class="opt-radio"></div>
        <div class="opt-txt">
          <div class="opt-main">${o.t}</div>
          ${o.d?`<div class="opt-desc">${o.d}</div>`:''}
        </div>
        <div class="opt-pts">+${(o.p*s.max).toFixed(o.p*s.max%1===0?0:1)}</div>
      </div>`).join('')}
  </div>

  <div class="evidence">
    <div class="evidence-h">
      <div class="evidence-title">${docIcon()} ${s.ev.title}</div>
      <div class="tier-badge ${s.ev.tierClass}">${s.ev.tier}</div>
    </div>
    <div class="evidence-desc">${s.ev.desc}</div>
    <div class="drop ${hasEv?'has':''}" id="drop_${s.id}" onclick="fakeUpload('${s.id}')">
      ${hasEv
        ? `<svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
           <div class="drop-main">${hasEv} — uploaded ✓</div>
           <div class="drop-sub">Click to replace</div>`
        : `<svg viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 0L8 7m4-4l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
           <div class="drop-main">Drag a file here or click to upload</div>
           <div class="drop-sub">PDF, image, or spreadsheet · up to 25 MB</div>`}
    </div>
    <div class="sub-guide">${bulbIcon()} <div>${s.ev.sub}</div></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost" onclick="prev()">Back</button>
    <button class="btn btn-primary" onclick="next()">Save &amp; continue
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>`;
}

/* ---------- REVIEW ---------- */
function reviewHTML(){
  const { composite, tier } = computeScore();
  const rows = scoreSections.map(s=>{
    const ans = state.answers[s.id];
    const answered = ans!==undefined;
    const pts = answered ? (s.opts[ans].p*s.max) : 0;
    return `<div class="review-row">
      <div class="rr-check ${answered?'ok':'no'}">
        ${answered
          ?'<svg viewBox="0 0 24 24" fill="none" style="color:#2c9c4c"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
          :'<svg viewBox="0 0 24 24" fill="none" style="color:#9AA0AB"><path d="M12 8v5M12 16v.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>'}
      </div>
      <div>
        <div class="rr-name">${s.label}</div>
        <div class="rr-tag">${s.tag}${state.evidence[s.id]?' · doc attached':' · no doc yet'}</div>
      </div>
      <div class="rr-pts" style="margin-left:auto">${answered?pts.toFixed(pts%1===0?0:1):'—'} / ${s.max}</div>
    </div>`;
  }).join('');

  const allAnswered = scoreSections.every(s=>state.answers[s.id]!==undefined);

  return `
  <span class="sec-tag tag-id">Final step · Review</span>
  <h1 class="q">Here's your live score.</h1>
  <p class="q-sub">This preview reflects your answers right now. When you submit, our team verifies your documents and finalizes your official CEIS™ score — which can rise as you add certifications and verified records.</p>

  <div class="final-score-card">
    <div class="fsc-label">Your projected CEIS™ score</div>
    <div class="fsc-num"><span>${composite.toFixed(1)}</span></div>
    <div class="fsc-tier">${tier}</div>
    <div class="fsc-note">Preview only. Verification can raise your score — higher-tier evidence unlocks the full points in each section.</div>
  </div>

  <div class="review-card">${rows}</div>

  <div class="why" style="margin-top:6px">
    <div class="why-h">${sparkIcon()} What happens after you submit</div>
    <div class="why-body">We review every submission personally — usually within <strong>10 business days</strong>. We verify your documents, run your Dun &amp; Bradstreet and public-record checks, and finalize your score. Then your public profile and QR scorecard go live, and you'll get a prioritized report showing the fastest ways to climb higher.</div>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost" onclick="prev()">Back</button>
    <button class="btn btn-primary glow" onclick="submitForm()" ${allAnswered?'':'disabled'}>
      ${allAnswered?'Submit for verification':'Answer all sections to submit'}
      ${allAnswered?'<svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
    </button>
  </div>`;
}

/* ============================================================
   SCORING ENGINE
   ============================================================ */
function computeScore(){
  let loc=0,sus=0,trn=0;
  scoreSections.forEach(s=>{
    const ans = state.answers[s.id];
    if(ans===undefined) return;
    const pts = s.opts[ans].p * s.max;
    if(s.pillar==='loc') loc+=pts;
    else if(s.pillar==='sus') sus+=pts;
    else trn+=pts;
  });
  loc=Math.min(loc,40); sus=Math.min(sus,30); trn=Math.min(trn,30);
  const composite = loc+sus+trn;
  return { loc, sus, trn, composite, tier:tierName(composite) };
}
function tierName(score){
  if(score>=90) return 'Community Champion';
  if(score>=75) return 'Above & Beyond';
  if(score>=60) return 'Solid Commitment';
  if(score>=40) return 'Growing Intentionally';
  if(score>0)   return 'Beginning the Journey';
  return 'Start your assessment';
}

function updateScore(){
  const { loc, sus, trn, composite, tier } = computeScore();
  const ls = document.getElementById('liveScore');
  const answered = Object.keys(state.answers).length>0;
  if(answered){
    ls.classList.add('scoring');
    ls.innerHTML = `${composite.toFixed(1)}<span class="pt">/100</span>`;
  } else {
    ls.classList.remove('scoring');
    ls.innerHTML = `—<span class="pt">/100</span>`;
  }
  document.getElementById('liveTier').textContent = tier;
  document.getElementById('vLoc').textContent = `${loc.toFixed(loc%1===0?0:1)} / 40`;
  document.getElementById('vSus').textContent = `${sus.toFixed(sus%1===0?0:1)} / 30`;
  document.getElementById('vTrn').textContent = `${trn.toFixed(trn%1===0?0:1)} / 30`;
  document.getElementById('bLoc').style.width = (loc/40*100)+'%';
  document.getElementById('bSus').style.width = (sus/30*100)+'%';
  document.getElementById('bTrn').style.width = (trn/30*100)+'%';
}

/* ============================================================
   PROGRESS
   ============================================================ */
function isComplete(i){
  const s = SECTIONS[i];
  if(s.kind==='score') return state.answers[s.id]!==undefined;
  if(s.kind==='identity') return !!state.identity.name && !!state.identity.cat;
  return false;
}
function updateProgress(){
  const total = scoreSections.length + 1; // +identity
  let done = scoreSections.filter(s=>state.answers[s.id]!==undefined).length;
  if(state.identity.name && state.identity.cat) done++;
  const pct = Math.round(done/total*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = pct+'% complete';
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function pick(id,i){
  state.answers[id]=i;
  document.querySelectorAll(`#opts_${id} .opt`).forEach((el,n)=>el.classList.toggle('sel',n===i));
  updateScore(); renderStepNav(); updateProgress();
}
function fakeUpload(id){
  const names=['statement.pdf','invoice_batch.pdf','payroll_export.xlsx','certificate.pdf','utility_bills.pdf','records.pdf'];
  state.evidence[id]=names[Math.floor(Math.random()*names.length)];
  render();
}
function saveIdentity(){
  state.identity = {
    name: document.getElementById('id_name').value,
    ein: document.getElementById('id_ein').value,
    state: document.getElementById('id_state').value,
    address: document.getElementById('id_address').value,
    cat: document.getElementById('id_cat').value,
    duns: document.getElementById('id_duns').value,
  };
  if(!state.identity.name || !state.identity.cat){
    alert('Please add your business name and category to continue.');
    return;
  }
  next();
}
function wire(s){
  // nothing extra needed; handlers are inline
}

/* ---------- inline icons ---------- */
function sparkIcon(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';}
function trendIcon(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 7-7M14 8h5v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function checkIcon(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function docIcon(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';}
function bulbIcon(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7c.6.5 1 1.3 1 2.1V17h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0012 2z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function iconForInline(p){
  const c = p==='loc'?'#138f83':p==='sus'?'#2c9c4c':'#1a5fb4';
  return `<span style="display:inline-flex;width:14px;height:14px;color:${c}">${iconFor(p)}</span>`;
}

/* ============================================================
   NAV
   ============================================================ */
function goTo(i){ state.current=i; render(); }
function next(){ if(state.current<SECTIONS.length-1){ state.current++; render(); } }
function prev(){ if(state.current>0){ state.current--; render(); } }
function saveExit(){
  const {composite}=computeScore();
  alert(`Progress saved ✓\n\nYour work is safe — you can pick up right where you left off.\nCurrent live score: ${composite.toFixed(1)} / 100`);
}
async function submitForm(){
  const { loc, sus, trn, composite, tier } = computeScore();

  // Show a saving state while we write to the database.
  canvas.innerHTML = `
  <div class="panel show" style="text-align:center;padding-top:60px">
    <div class="pulse" style="font-size:40px;margin-bottom:18px">⏳</div>
    <h1 class="serif" style="font-size:30px;font-weight:600;letter-spacing:-.5px">Saving your assessment…</h1>
    <p style="font-size:15px;color:var(--gray);margin-top:8px">Securely recording your submission.</p>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});

  // Geocode the address so the business can be placed on the map (best-effort).
  const geo = await geocodeAddress(state.identity.address);

  // Build the record from the user's answers.
  const payload = {
    business_name: state.identity.name || 'Unnamed business',
    ein:        state.identity.ein   || null,
    reg_state:  state.identity.state || null,
    category:   state.identity.cat   || null,
    duns:       state.identity.duns  || null,
    address:    state.identity.address || null,
    lat:        geo.lat,
    lng:        geo.lng,
    answers:    state.answers,
    evidence:   state.evidence,
    score_loc:  Number(loc.toFixed(2)),
    score_sus:  Number(sus.toFixed(2)),
    score_trn:  Number(trn.toFixed(2)),
    score_total:Number(composite.toFixed(2)),
    tier:       tier,
    status:     'submitted',
  };

  let saved = false, errMsg = null;
  // Client-side reference code shown to the user (submissions stay private — no read-back).
  const refShort = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())).slice(0, 8).toUpperCase();
  if (sb) {
    try {
      // Submissions are tied to the logged-in business owner.
      const { data: u } = await sb.auth.getUser();
      const uid = u && u.user ? u.user.id : null;
      if (!uid) {
        errMsg = 'Please log in as a business owner first, then resubmit. (Open the assessment from the Pricing screen after signing in.)';
      } else {
        const { error } = await sb
          .from('ceis_submissions')
          .insert({ ...payload, ref_code: refShort, user_id: uid });
        if (error) throw error;
        saved = true;
      }
    } catch (e) {
      errMsg = (e && e.message) || 'Unknown error';
    }
  } else {
    errMsg = 'No database connection configured.';
  }
  const statusLine = saved
    ? `<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(125,200,50,.12);color:#2c9c4c;border:1px solid rgba(125,200,50,.4);border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;margin-bottom:24px">
         ${checkIcon()} Saved to your DollarVote record${refShort?` · Ref ${refShort}`:''}
       </div>`
    : `<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(193,68,14,.1);color:#C1440E;border:1px solid rgba(193,68,14,.3);border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;margin-bottom:24px">
         ⚠ Couldn't save automatically — your answers are safe in this window. (${errMsg})
       </div>`;

  canvas.innerHTML = `
  <div class="panel show" style="text-align:center;padding-top:40px">
    <div style="width:90px;height:90px;border-radius:50%;background:var(--grad);display:grid;place-items:center;margin:0 auto 28px;box-shadow:0 20px 50px rgba(26,143,160,.4)">
      <svg viewBox="0 0 24 24" fill="none" width="44" height="44"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 class="serif" style="font-size:42px;font-weight:600;letter-spacing:-1px;margin-bottom:14px">You're submitted!</h1>
    ${statusLine}
    <p style="font-size:18px;color:var(--gray);max-width:480px;margin:0 auto 30px;line-height:1.6">
      Your projected score is <strong style="color:var(--ink)">${composite.toFixed(1)}</strong> — <strong style="color:var(--teal)">${tier}</strong>.
      We'll verify your documents and finalize your official CEIS™ score within 10 business days, then your profile goes live.
    </p>
    ${(geo && geo.lat!=null)
      ? `<p style="font-size:14px;color:var(--gray);max-width:480px;margin:-12px auto 30px;line-height:1.6">📍 Your business is now on the DollarVote map with a <strong style="color:var(--ink)">faded score</strong> — it turns solid once we verify you.</p>`
      : ``}
    <div class="final-score-card" style="max-width:420px;margin:0 auto">
      <div class="fsc-label">Projected CEIS™ Score</div>
      <div class="fsc-num"><span>${composite.toFixed(1)}</span></div>
      <div class="fsc-tier">${tier}</div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:34px">
      <a class="btn btn-primary glow" href="/?screen=bizDashboard" style="text-decoration:none">
        ${checkIcon()} Go to my dashboard
      </a>
      <a class="btn btn-ghost" href="/?screen=map" style="text-decoration:none">Explore the map</a>
    </div>
    <p style="font-size:13px;color:var(--gray);margin-top:18px">You can close this tab anytime — your assessment is saved.</p>
  </div>`;
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progTxt').textContent = saved ? 'Submitted ✓' : 'Submit failed';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
</body>
</html>
